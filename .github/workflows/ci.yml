name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - '.local/**'
  pull_request:
    paths-ignore:
      - '**/*.md'
      - '.local/**'

concurrency:
  group: 'ci-${{ github.head_ref || github.ref }}-${{ github.workflow }}'
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # Read scripts/supported-kotlin-versions.txt (SSOT) and emit it as a JSON array
  # that downstream matrix jobs can consume via `fromJSON`.
  versions:
    name: 'resolve supported Kotlin versions'
    runs-on: ubuntu-latest
    outputs:
      list: ${{ steps.read.outputs.list }}
    steps:
      - uses: actions/checkout@v4
      - id: read
        run: |
          list=$(grep -vE '^\s*(#|$)' scripts/supported-kotlin-versions.txt \
                   | jq -R . | jq -sc .)
          echo "list=$list" >> "$GITHUB_OUTPUT"
          echo "Resolved: $list"

  # Runtime KMP tests + kctfork unit tests pinned to the project's Kotlin version.
  # Fastest path — everything in-process, single Kotlin.
  unit-pinned:
    name: 'unit (pinned Kotlin)'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: Run compiler unit tests (pinned)
        run: ./gradlew :debuggable-compiler:test --no-daemon
      - name: Run runtime jvm tests
        run: ./gradlew :debuggable-runtime:jvmTest --no-daemon
      - name: Upload reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: reports-unit-pinned
          path: '**/build/reports/**'

  # kctfork-based fine-grained tests per Kotlin compiler version.
  # Swaps both `kotlin-compiler-embeddable` and `kctfork` to match each target.
  # Versions without a published kctfork release fall back to the closest
  # compatible one — any real incompatibility surfaces as a test failure.
  unit-matrix:
    name: 'unit / kotlin-${{ matrix.kotlin }}'
    needs: versions
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        kotlin: ${{ fromJSON(needs.versions.outputs.list) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: Run :debuggable-compiler:test for Kotlin ${{ matrix.kotlin }}
        run: ./gradlew :debuggable-compiler:test -Ptest.kotlin=${{ matrix.kotlin }} --no-daemon
      - name: Upload reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: reports-unit-${{ matrix.kotlin }}
          path: '**/build/reports/**'

  # End-to-end smoke: build integration-test/cmp with each target Kotlin and
  # verify the injected bytecode symbols are present.
  integration:
    name: 'integration / kotlin-${{ matrix.kotlin }}'
    needs: versions
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        kotlin: ${{ fromJSON(needs.versions.outputs.list) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: Run smoke test for Kotlin ${{ matrix.kotlin }}
        run: ./scripts/smoke-test.sh ${{ matrix.kotlin }}
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: reports-integration-${{ matrix.kotlin }}
          path: |
            .local/tmp/smoke-*kotlin-${{ matrix.kotlin }}*.log
            **/build/reports/**

  # Fan-in check for branch protection.
  final:
    if: always()
    runs-on: ubuntu-latest
    needs: [versions, unit-pinned, unit-matrix, integration]
    steps:
      - name: Check all results
        run: |
          results='${{ toJSON(needs.*.result) }}'
          echo "Results: $results"
          if echo "$results" | grep -q -E '(failure|cancelled)'; then
            echo "One or more required jobs failed"
            exit 1
          fi
          echo "All required jobs passed"
