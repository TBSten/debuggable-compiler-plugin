name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - '.local/**'
  pull_request:
    paths-ignore:
      - '**/*.md'
      - '.local/**'

concurrency:
  group: 'ci-${{ github.head_ref || github.ref }}-${{ github.workflow }}'
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # Layer A: kctfork-based fine-grained tests against the pinned Kotlin version (2.3.20).
  unit:
    name: 'unit (kctfork @ pinned)'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run compiler unit tests
        run: ./gradlew :debuggable-compiler:test --no-daemon

      - name: Run runtime jvm tests
        run: ./gradlew :debuggable-runtime:jvmTest --no-daemon

      - name: Upload reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: reports-unit
          path: '**/build/reports/**'

  # Layer B: integration-test/cmp smoke test per target Kotlin version.
  # Confirms the plugin JAR (compiled with the pinned Kotlin) loads and injects bytecode
  # correctly when consumed by each target Kotlin compiler.
  integration:
    name: 'integration / kotlin-${{ matrix.kotlin }}'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        kotlin:
          - '2.2.0'
          - '2.2.10'
          - '2.2.20'
          - '2.2.21'
          - '2.3.0'
          - '2.3.10'
          - '2.3.20'
          - '2.3.21-RC2'
          - '2.4.0-Beta1'
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run smoke test for Kotlin ${{ matrix.kotlin }}
        run: ./scripts/smoke-test.sh ${{ matrix.kotlin }}

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: reports-integration-${{ matrix.kotlin }}
          path: |
            .local/tmp/smoke-*kotlin-${{ matrix.kotlin }}*.log
            **/build/reports/**

  # Fan-in job for branch protection — stays green only if both unit and integration pass.
  final:
    if: always()
    runs-on: ubuntu-latest
    needs: [unit, integration]
    steps:
      - name: Check all results
        run: |
          results='${{ toJSON(needs.*.result) }}'
          echo "Results: $results"
          if echo "$results" | grep -q -E '(failure|cancelled)'; then
            echo "One or more required jobs failed"
            exit 1
          fi
          echo "All required jobs passed"
